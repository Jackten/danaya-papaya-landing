<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danaya Yerzhanova — Story-Driven Content</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
  /* ============================================================
     ✏️  CONTENT — edit everything here, nowhere else
     ============================================================
     LINE BREAKS: use \n inside a string to start a new line.
     REMOVE A DASH: just delete the "- " from the list items.
     ============================================================ */

  const CONTENT = {

    // ── Meta
    name:     "Danaya Yerzhanova",
    location: "Phuket, Thailand",
    handle:   "@danaya_papaya",
    email:    "hello.danaya.papaya@gmail.com",
    year:     "2026",

    // ── Hero
    hero: {
      headline:    "Turning moments\ninto stories\npeople actually\nFEEL ✨",
      subheading:  "Story-driven content for hospitality, travel, and products.",
      intro:       "In a sea of polished sameness, story is what makes people stay.",
      cta:         "Work with me",
    },

    // ── About
    about: {
      title: "About",
      paragraphs: [
        "Both my parents are journalists. I grew up watching them find the story in the ordinary — a habit I never shook.",
        "I spent years in hospitality at JW Marriott, learning how people experience places. What makes a stay memorable. What guests actually talk about. That's the lens I bring to content.",
        "Now based in Phuket, I blend humor, emotional honesty, and sharp observation into content that connects — for the brands behind the experiences, not just the aesthetics.",
      ],
    },

    // ── What I Create (label + description pairs)
    create: {
      title: "What I create",
      items: [
        { label: "Short-form video",      desc: "Reels · TikTok · Stories" },
        { label: "Lifestyle storytelling", desc: "Moments that define a stay" },
        { label: "Hotel & stay features",  desc: "Property · experience · feel" },
        { label: "Product integrations",   desc: "Natural, not forced" },
        { label: "Photo assets",           desc: "Captured alongside every video shoot" },
      ],
      note: "All content is designed to feel organic, not overly produced.",
    },

    // ── Story Angles
    angles: {
      title: "Story angles",
      intro: "The perspectives I bring to a brief. Not content directions — more like a way of seeing.",
      items: [
        {
          headline: "Three generations, one trip",
          body: "When grandparents, parents, and kids all experience the same place differently — that tension is the story. Rich, layered, universally recognizable.",
        },
        {
          headline: "The moment before the memory",
          body: "The quiet coffee before the day starts. The walk back from dinner. Everyday in-between moments that actually define how a stay feels — and what people remember.",
        },
        {
          headline: "Place as character",
          body: "A destination isn't a backdrop — it's an active participant in the story. This angle brings out what makes a place behave the way it does on people.",
        },
      ],
    },

    // ── Work With Me (opens in drawer)
    work: {
      drawerTitle: "Work with me",

      deliverablesTitle: "Deliverables",
      deliverables: [
        "3–5 short-form videos (edited, ready to post)",
        "Supporting photo assets",
        "Optional: raw footage for your own edits",
      ],
      deliverablesNote: "Scope tailored case by case.",

      whyTitle: "Why this works",
      why: [
        { label: "Builds trust",  desc: "Not just visibility" },
        { label: "Feels native",  desc: "Not like an ad" },
        { label: "Saves & shares", desc: "Content worth keeping" },
        { label: "Reusable",      desc: "Across your channels" },
      ],

      closingLine: "Let's create something people\nactually want to watch",
      closingTags: "Hospitality · Travel · Lifestyle",
    },

  };
  /* ============================================================
     End of editable content
     ============================================================ */
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans:    ['DM Sans', 'system-ui', 'sans-serif'],
            display: ['Playfair Display', 'Georgia', 'serif'],
          },
        }
      }
    }
  </script>

  <style>
    :root {
      --papaya:      #ff6f1a;
      --papaya-mid:  #ffb872;
      --papaya-soft: #fff8f0;
      --papaya-dark: #c43a0c;
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--papaya-soft);
      background-image:
        radial-gradient(circle at 18% 18%, rgba(255,146,64,.12) 0%, transparent 50%),
        radial-gradient(circle at 82% 82%, rgba(255,180,100,.10) 0%, transparent 50%),
        radial-gradient(circle at 60%  8%, rgba(255,220,160,.15) 0%, transparent 40%);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='2' fill='%23ff9240' fill-opacity='.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .shape { position:absolute; border-radius:50%; opacity:.06; pointer-events:none; }

    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,146,64,.12);
      box-shadow: 0 2px 4px rgba(0,0,0,.04), 0 8px 32px rgba(255,111,26,.06), 0 0 0 1px rgba(255,255,255,.8) inset;
      border-radius: 1.5rem;
    }
    .inner-card {
      background: white;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      border-radius: 1rem;
    }

    .dot { width:6px; height:6px; border-radius:50%; background:var(--papaya); display:inline-block; flex-shrink:0; }
    .tag { background:var(--papaya-soft); border:1px solid rgba(255,111,26,.2); color:var(--papaya-dark); font-size:.75rem; font-weight:500; letter-spacing:.04em; border-radius:9999px; padding:.2rem .75rem; }
    .label { font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--papaya); }
    .divider { height:1px; background:linear-gradient(to right,transparent,rgba(255,111,26,.18),transparent); }

    .angle { border-left:2px solid var(--papaya-mid); transition:border-color .2s; }
    .angle:hover { border-left-color:var(--papaya); }

    .btn-primary {
      background:var(--papaya); color:white; border-radius:.75rem;
      padding:.85rem 1.75rem; font-size:.875rem; font-weight:500;
      box-shadow:0 2px 8px rgba(255,111,26,.25);
      transition:all .18s ease; display:inline-block; cursor:pointer; text-decoration:none;
    }
    .btn-primary:hover { background:var(--papaya-dark); transform:translateY(-1px); box-shadow:0 4px 16px rgba(255,111,26,.35); }
    .btn-outline {
      border:1px solid rgba(255,111,26,.3); color:var(--papaya-dark); border-radius:.75rem;
      padding:.85rem 1.75rem; font-size:.875rem; font-weight:500;
      transition:all .18s ease; display:inline-block; cursor:pointer; text-decoration:none;
    }
    .btn-outline:hover { background:var(--papaya-soft); }

    /* Animate in */
    [data-a] { opacity:0; transform:translateY(18px); transition:opacity .55s ease, transform .55s ease; }
    [data-a].on { opacity:1; transform:none; }

    /* ── Drawer ── */
    #drawer-bg {
      position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:50;
      opacity:0; pointer-events:none; transition:opacity .3s ease;
      backdrop-filter:blur(4px);
    }
    #drawer-bg.open { opacity:1; pointer-events:all; }
    #drawer {
      position:fixed; right:0; top:0; bottom:0; width:min(480px,100vw);
      background:white; z-index:51; overflow-y:auto;
      transform:translateX(100%); transition:transform .35s cubic-bezier(.4,0,.2,1);
      box-shadow:-8px 0 40px rgba(0,0,0,.12);
    }
    #drawer.open { transform:translateX(0); }

    .drawer-inner { padding:2.5rem 2rem; }
    @media(min-width:480px){ .drawer-inner{ padding:3rem 2.5rem; } }
  </style>
</head>
<body class="font-sans relative">

  <!-- bg shapes -->
  <div class="shape" style="width:320px;height:320px;background:#ff6f1a;top:-80px;right:-80px;"></div>
  <div class="shape" style="width:200px;height:200px;background:#ffb872;bottom:20%;left:-60px;"></div>
  <div class="shape" style="width:140px;height:140px;background:#ff9240;top:42%;right:4%;"></div>

  <!-- ═══════════════════════════════ MAIN ═══════════════════════════════ -->
  <div class="relative z-10 max-w-2xl mx-auto px-4 py-12 md:py-20" id="page"></div>

  <!-- ═══════════════════════════════ DRAWER ════════════════════════════ -->
  <div id="drawer-bg" onclick="closeDrawer()"></div>
  <div id="drawer" role="dialog" aria-modal="true" aria-label="Work with me">
    <div class="drawer-inner" id="drawer-content"></div>
  </div>

  <!-- ══════════════════════════════ RENDER ════════════════════════════ -->
  <script>
    /* nl2br helper */
    const nl = s => s.replace(/\n/g, '<br>');

    /* ── Build page ── */
    const page = document.getElementById('page');
    page.innerHTML = `

      <!-- HERO -->
      <div class="card px-8 py-12 md:px-12 md:py-16 mb-6" data-a>
        <div class="flex items-center gap-2 mb-8">
          <span class="dot"></span>
          <span class="tag">${CONTENT.location}</span>
        </div>
        <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">${CONTENT.name}</p>
        <h1 class="font-display text-4xl md:text-5xl font-medium text-gray-900 leading-tight mb-4" style="color:#111">
          ${nl(CONTENT.hero.headline).replace('FEEL ✨','<span style="color:var(--papaya);font-style:italic">FEEL ✨</span>')}
        </h1>
        <p class="text-gray-500 text-base mb-2">${CONTENT.hero.subheading}</p>
        <p class="text-gray-600 text-base leading-relaxed mb-10">${CONTENT.hero.intro}</p>
        <button class="btn-primary" onclick="openDrawer()">${CONTENT.hero.cta} →</button>
      </div>

      <!-- ABOUT -->
      <div class="card px-8 py-10 md:px-12 mb-6" data-a>
        <p class="label mb-5">${CONTENT.about.title}</p>
        ${CONTENT.about.paragraphs.map(p => `<p class="text-gray-700 text-base leading-relaxed mb-4">${nl(p)}</p>`).join('')}
      </div>

      <!-- WHAT I CREATE -->
      <div class="card px-8 py-10 md:px-12 mb-6" data-a>
        <p class="label mb-5">${CONTENT.create.title}</p>
        <div class="grid grid-cols-2 gap-3 mb-3">
          ${CONTENT.create.items.slice(0,-1).map(i => `
            <div class="inner-card p-4">
              <p class="font-medium text-gray-900 text-sm mb-1">${i.label}</p>
              <p class="text-gray-500 text-xs">${i.desc}</p>
            </div>`).join('')}
        </div>
        <div class="inner-card p-4 mb-5">
          <p class="font-medium text-gray-900 text-sm mb-1">${CONTENT.create.items.at(-1).label}</p>
          <p class="text-gray-500 text-xs">${CONTENT.create.items.at(-1).desc}</p>
        </div>
        <p class="text-gray-400 text-sm italic">${CONTENT.create.note}</p>
      </div>

      <!-- STORY ANGLES -->
      <div class="card px-8 py-10 md:px-12 mb-6" data-a>
        <p class="label mb-2">${CONTENT.angles.title}</p>
        <p class="text-gray-500 text-sm mb-7">${CONTENT.angles.intro}</p>
        <div class="space-y-5">
          ${CONTENT.angles.items.map((a,i) => `
            ${i > 0 ? '<div class="divider my-1"></div>' : ''}
            <div class="angle pl-5 py-1">
              <p class="font-display text-lg font-medium text-gray-900 mb-1">${a.headline}</p>
              <p class="text-gray-500 text-sm leading-relaxed">${a.body}</p>
            </div>`).join('')}
        </div>
      </div>

      <!-- WORK TEASER (opens drawer) -->
      <div class="card px-8 py-8 md:px-12 mb-6 flex items-center justify-between gap-4 cursor-pointer group" data-a onclick="openDrawer()">
        <div>
          <p class="label mb-1">Deliverables & why it works</p>
          <p class="text-gray-500 text-sm">What you get, and why it lands.</p>
        </div>
        <span style="color:var(--papaya);font-size:1.5rem;transition:transform .2s" class="group-hover:translate-x-1">→</span>
      </div>

      <!-- FOOTER -->
      <p class="text-center text-gray-300 text-xs mt-4 pb-4">© ${CONTENT.year} ${CONTENT.name}</p>
    `;

    /* ── Build drawer ── */
    const W = CONTENT.work;
    document.getElementById('drawer-content').innerHTML = `
      <div class="flex items-center justify-between mb-8">
        <p class="font-display text-2xl font-medium text-gray-900">${W.drawerTitle}</p>
        <button onclick="closeDrawer()" style="color:#aaa;font-size:1.5rem;line-height:1;background:none;border:none;cursor:pointer" aria-label="Close">✕</button>
      </div>

      <p class="label mb-4">${W.deliverablesTitle}</p>
      <div class="space-y-3 mb-2">
        ${W.deliverables.map(d => `
          <div class="flex items-start gap-3">
            <span class="dot mt-1.5"></span>
            <p class="text-gray-700 text-sm">${d}</p>
          </div>`).join('')}
      </div>
      <p class="text-gray-400 text-sm italic mb-8">${W.deliverablesNote}</p>

      <div class="divider mb-8"></div>

      <p class="label mb-4">${W.whyTitle}</p>
      <div class="grid grid-cols-2 gap-3 mb-8">
        ${W.why.map(w => `
          <div class="inner-card p-4">
            <p class="font-medium text-gray-900 text-sm">${w.label}</p>
            <p class="text-gray-500 text-xs mt-1">${w.desc}</p>
          </div>`).join('')}
      </div>

      <div class="divider mb-8"></div>

      <p class="font-display text-xl font-medium text-gray-900 mb-1">${nl(W.closingLine).replace('actually want to watch','<span style="color:var(--papaya);font-style:italic">actually want to watch</span>')}</p>
      <p class="text-gray-400 text-sm mb-8">${W.closingTags}</p>

      <div class="flex flex-col gap-3">
        <a href="mailto:${CONTENT.email}" class="btn-primary text-center">${CONTENT.email}</a>
        <a href="https://instagram.com/${CONTENT.handle.replace('@','')}" target="_blank" class="btn-outline text-center">${CONTENT.handle}</a>
      </div>
    `;

    /* ── Scroll animations ── */
    const obs = new IntersectionObserver(entries => {
      entries.forEach((e,i) => {
        if(e.isIntersecting){
          setTimeout(() => e.target.classList.add('on'), i*80);
          obs.unobserve(e.target);
        }
      });
    }, {threshold:.08});
    document.querySelectorAll('[data-a]').forEach(el => obs.observe(el));

    /* ── Drawer ── */
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-bg').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-bg').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });
  </script>
</body>
</html>
